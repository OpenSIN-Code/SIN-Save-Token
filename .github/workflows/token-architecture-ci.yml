name: Token Architecture CI

on:
  pull_request:
  push:
    branches-ignore:
      - main
      - master

permissions:
  contents: read

jobs:
  architecture-contracts:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install schema validator
        run: python3 -m pip install --disable-pip-version-check 'jsonschema>=4.18,<5'

      - name: Validate JSON documents and policy schemas
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r -d '' file; do
            python3 -m json.tool "$file" >/dev/null
          done < <(find config schemas -type f -name '*.json' -print0)
          python3 - <<'PY'
          import json
          from jsonschema import Draft202012Validator

          schema = json.load(open(
              "config/orca-orchestrator.schema.json",
              encoding="utf-8",
          ))
          policy = json.load(open(
              "config/orca-orchestrator.json",
              encoding="utf-8",
          ))
          Draft202012Validator.check_schema(schema)
          Draft202012Validator(schema).validate(policy)
          PY

      - name: Compile Python sources
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r -d '' file; do
            python3 -m py_compile "$file"
          done < <(find lib tests -type f -name '*.py' -print0)
          python3 -m py_compile \
            bin/sin-context \
            bin/sin-orca \
            bin/gitnexus-query \
            bin/benchmark-context \
            bin/audit-token-architecture.py \
            scripts/verify-local-integration.py \
            scripts/live-orca-smoke.py

      - name: Run unit and contract tests
        run: python3 -m unittest discover -s tests -p 'test_*.py'

      - name: Enforce provider routing contracts
        run: |
          python3 - <<'PY'
          import json

          context = json.load(open("config/context-policy.json", encoding="utf-8"))
          intelligence = json.load(open("config/intelligence-providers.json", encoding="utf-8"))
          runtime = json.load(open("config/provider-runtime.json", encoding="utf-8"))
          orchestrator = json.load(open("config/orca-orchestrator.json", encoding="utf-8"))
          routes = {route["name"]: route for route in context["routes"]}
          symbols = intelligence["providers"]["symbol_navigation"]
          graph = intelligence["providers"]["general_code_graph"]
          assert routes["code_symbol"]["providers"] == [
              symbols["primary"], symbols["fallback"]
          ]
          assert routes["code_architecture"]["providers"] == [
              graph["primary"], graph["fallback"]
          ]
          assert graph["allow_simultaneous_execution"] is False
          assert "gitnexus" in runtime["providers"]
          assert "code-review-graph" in runtime["providers"]

          team = orchestrator["team_runtime"]
          contract = orchestrator["worker_contract"]
          assert team["workspace_mode"] == "same-worktree"
          assert team["spawn_primitive"] == "orca-terminal-create"
          assert team["forbid_worker_worktrees"] is True
          assert team["parallel_write_policy"] == "exclusive-repository-writer"
          assert team["maximum_parallel_editors"] == 1
          assert contract["approval_mode"] == "stepwise"
          assert contract["checkpoint_policy"] == "callback-stop-for-explicit-approval"
          assert contract["forbid_new_worktrees"] is True
          assert contract["forbid_sleep_polling"] is True
          PY

      - name: Run cross-repository architecture audit with fixtures
        shell: bash
        run: |
          set -euo pipefail
          fixture_root="$RUNNER_TEMP/token-architecture-fixtures"
          python3 tests/build_cross_repo_ci_fixtures.py "$fixture_root"
          python3 bin/audit-token-architecture.py \
            --sst . \
            --wow "$fixture_root/wow-my-zsh" \
            --global-brain "$fixture_root/global-brain"

      - name: Check changed whitespace
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git diff --check "origin/${{ github.base_ref }}...HEAD"
          else
            git show --check --oneline --no-renames HEAD
          fi
